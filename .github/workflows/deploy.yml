# Build static site and deploy to GitHub Pages.
# Repo settings → Pages → Source: GitHub Actions.
# Later: add a custom domain in Pages settings and use VITE_BASE_PATH=/ for builds if needed.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set Vite base path for GitHub Pages
        id: base
        run: |
          # Optional: set repository variable VITE_BASE_PATH to "/" when you add a custom domain.
          CUSTOM='${{ vars.VITE_BASE_PATH }}'
          if [ -n "$CUSTOM" ]; then
            echo "path=$CUSTOM" >> "$GITHUB_OUTPUT"
            echo "Using repo variable VITE_BASE_PATH."
            exit 0
          fi
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
            echo "Using root base for user/org GitHub Pages site."
          else
            echo "path=/$NAME/" >> "$GITHUB_OUTPUT"
            echo "Using project base /$NAME/ for GitHub Pages."
          fi

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
          VITE_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
