# GitHub Pages — build & deploy. Add custom domain in repo → Settings → Pages.
#
# DNS (at Hostinger or your registrar): point the domain to GitHub — see
# https://docs.github.com/pages/configuring-a-custom-domain-for-your-github-pages-site
#
# This site uses the custom domain rishicapitaladvisory.com → Vite base "/".

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Vite base path & site URL (custom domain)
        id: envs
        run: |
          # Optional overrides: repo → Settings → Variables → Actions
          BASE='${{ vars.VITE_BASE_PATH }}'
          PUB='${{ vars.VITE_PUBLIC_SITE_URL }}'
          if [ -z "$BASE" ]; then BASE="/"; fi
          if [ -z "$PUB" ]; then PUB="https://rishicapitaladvisory.com"; fi
          echo "path=$BASE" >> "$GITHUB_OUTPUT"
          echo "pub=$PUB" >> "$GITHUB_OUTPUT"
          echo "Using VITE_BASE_PATH=$BASE and VITE_PUBLIC_SITE_URL=$PUB"

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.envs.outputs.path }}
          VITE_PUBLIC_SITE_URL: ${{ steps.envs.outputs.pub }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
