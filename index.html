<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- GitHub Pages → custom domain (Hostinger). No-op on rishicapitaladvisory.com / localhost. -->
    <script>
      (function () {
        var h = location.hostname;
        if (h !== "arishdhingra1.github.io") return;
        var base = "/rishiwadhawan";
        var p = location.pathname;
        if (!p.startsWith(base)) return;
        var rest = p.slice(base.length) || "/";
        if (rest.charAt(0) !== "/") rest = "/" + rest;
        location.replace(
          "https://rishicapitaladvisory.com" +
            rest +
            location.search +
            location.hash
        );
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="SEBI Registered Research Analyst — Rishi Wadhawan. Independent equity research and market insights."
    />
    <title>Rishi Wadhawan | SEBI Registered Research Analyst</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,650;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
