<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <!-- GitHub Pages → custom domain (Hostinger). No-op on rishicapitaladvisory.com / localhost. -->
    <script>
      (function () {
        var h = location.hostname;
        if (h !== "arishdhingra1.github.io") return;
        var base = "/rishiwadhawan";
        var p = location.pathname;
        if (!p.startsWith(base)) return;
        var rest = p.slice(base.length) || "/";
        if (rest.charAt(0) !== "/") rest = "/" + rest;
        location.replace(
          "https://rishicapitaladvisory.com" +
            rest +
            location.search +
            location.hash
        );
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />

    <!-- Primary SEO (defaults; RouteSeo updates title/description/OG per route in SPA) -->
    <title>Rishi Wadhawan | SEBI Registered Research Analyst</title>
    <meta
      name="description"
      content="SEBI-registered research analyst (INH000025726). Independent equity research, risk-aware market context, and disclosures—serving investors in India."
    />
    <meta
      name="keywords"
      content="SEBI research analyst, equity research India, INH000025726, Rishi Wadhawan, Panchkula, independent research"
    />
    <meta name="author" content="Rishi Wadhawan" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="__SITE_URL__/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rishi Wadhawan" />
    <meta
      property="og:title"
      content="Rishi Wadhawan | SEBI Registered Research Analyst"
    />
    <meta
      property="og:description"
      content="SEBI-registered research analyst (INH000025726). Independent equity research, risk-aware market context, and disclosures—serving investors in India."
    />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Rishi Wadhawan | SEBI Registered Research Analyst"
    />
    <meta
      name="twitter:description"
      content="SEBI-registered research analyst (INH000025726). Independent equity research and disclosures."
    />

    <!-- Geo / regional relevance (India) -->
    <meta name="geo.region" content="IN-HR" />
    <meta name="geo.placename" content="Panchkula" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,650;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
